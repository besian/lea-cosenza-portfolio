<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Lea Cosenza — Admin</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

<style>
  :root{
    --paper:#ece7dd;
    --paper-2:#e2dccf;
    --ink:#161412;
    --ink-2:#3a3530;
    --rule:rgba(22,20,18,.18);
    --rule-2:rgba(22,20,18,.08);
    --accent:#ff3b1f;
    --green:#0a8a55;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
    font-family:"Archivo",sans-serif;font-weight:500;
    -webkit-font-smoothing:antialiased;text-rendering:geometricPrecision;
  }
  a{color:inherit;text-decoration:none}
  button{background:none;border:0;color:inherit;font:inherit;padding:0;cursor:pointer}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;letter-spacing:.02em}
  .ital{font-family:"Instrument Serif",serif;font-style:italic;font-weight:400}
  ::selection{background:var(--accent);color:var(--paper)}

  /* ── Layout ─────────────────────────────────────────────────── */
  .app{display:grid;grid-template-columns:300px minmax(0,1fr);min-height:100vh}
  .sidebar{
    position:sticky;top:0;height:100vh;overflow-y:auto;
    border-right:1px solid var(--rule);background:var(--paper-2);
    display:flex;flex-direction:column;
  }
  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:18px 22px;border-bottom:1px solid var(--rule);
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--ink-2);
  }
  .topbar .mark{display:inline-flex;align-items:center;gap:8px;font-weight:700;color:var(--ink)}
  .topbar .dot{width:7px;height:7px;background:var(--accent);border-radius:50%;display:inline-block}
  .topbar a{color:var(--ink);text-decoration:underline;text-decoration-color:var(--rule);text-underline-offset:3px}
  .topbar a:hover{text-decoration-color:var(--accent)}

  .side-list{flex:1;overflow-y:auto;padding:10px 0}
  .side-item{
    display:grid;grid-template-columns:36px 1fr auto;align-items:center;gap:10px;
    padding:11px 22px;border-bottom:1px solid var(--rule-2);
    cursor:pointer;font-family:"JetBrains Mono",monospace;font-size:11.5px;
    letter-spacing:.04em;text-transform:uppercase;color:var(--ink);
  }
  .side-item:hover{background:rgba(0,0,0,.04)}
  .side-item.is-on{background:var(--ink);color:var(--paper)}
  .side-item.is-on .si-disc{color:rgba(255,255,255,.6)}
  .side-item.is-dirty .si-num::after{content:"●";color:var(--accent);margin-left:6px}
  .si-num{font-weight:700}
  .si-title{font-family:"Archivo",sans-serif;font-weight:800;font-size:13.5px;letter-spacing:-0.01em;text-transform:none;line-height:1.1;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .si-disc{font-size:10px;letter-spacing:.06em;color:var(--ink-2);text-align:right}

  .side-foot{padding:14px 22px;border-top:1px solid var(--rule);display:flex;flex-direction:column;gap:8px;
    font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2)}
  .side-foot button{text-align:left;color:var(--ink-2);padding:4px 0}
  .side-foot button:hover{color:var(--accent)}

  /* ── Main / Form ────────────────────────────────────────────── */
  .main{padding:32px 40px 80px;max-width:1000px}
  .main-head{
    display:flex;align-items:end;justify-content:space-between;gap:24px;
    padding-bottom:18px;border-bottom:1px solid var(--rule);margin-bottom:32px;
  }
  .main-h{margin:0;font-family:"Archivo",sans-serif;font-weight:900;font-size:clamp(36px,5vw,72px);
    line-height:.9;letter-spacing:-0.03em;text-transform:uppercase}
  .main-h em{font-family:"Instrument Serif",serif;font-style:italic;font-weight:400;color:var(--accent)}
  .main-h .kicker{display:block;font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:500;
    letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);margin-bottom:10px;letter-spacing:.1em}
  .main-head .actions{display:flex;gap:10px}
  .btn{
    padding:9px 16px;border:1px solid var(--ink);border-radius:999px;
    font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;color:var(--ink);background:transparent;
    transition:background .15s,color .15s;
  }
  .btn:hover{background:var(--ink);color:var(--paper)}
  .btn.primary{background:var(--ink);color:var(--paper)}
  .btn.primary:hover{background:var(--accent);border-color:var(--accent)}
  .btn.danger{border-color:var(--accent);color:var(--accent)}
  .btn.danger:hover{background:var(--accent);color:var(--paper)}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  .card{
    background:var(--paper);border:1px solid var(--rule);
    margin-bottom:18px;padding:22px;
  }
  .card-head{
    display:flex;align-items:baseline;justify-content:space-between;gap:18px;
    padding-bottom:14px;border-bottom:1px solid var(--rule);margin-bottom:18px;
  }
  .card-h{margin:0;font-family:"Archivo",sans-serif;font-weight:800;font-size:18px;letter-spacing:-0.01em;text-transform:uppercase}
  .card-hint{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2)}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .field{display:flex;flex-direction:column;gap:6px;min-width:0}
  .field label{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2)}
  .field input,.field textarea,.field select{
    width:100%;font:inherit;font-family:"Archivo",sans-serif;font-weight:500;font-size:14.5px;
    color:var(--ink);background:var(--paper);border:1px solid var(--rule);
    padding:9px 12px;border-radius:6px;outline:none;
    transition:border-color .12s,background .12s;
  }
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--ink);background:var(--paper-2)}
  .field textarea{min-height:90px;resize:vertical;line-height:1.4}
  .field.mono input,.field.mono textarea{font-family:"JetBrains Mono",monospace;font-size:13px;letter-spacing:.02em}
  .field-row{display:flex;gap:10px;align-items:center}
  .field-row .field{flex:1}

  .credit-row{display:grid;grid-template-columns:1fr 1.4fr auto;gap:10px;align-items:center;margin-bottom:8px}
  .pal-row{display:grid;grid-template-columns:46px 46px 1fr auto;gap:10px;align-items:center;margin-bottom:8px}
  .pal-swatch{width:46px;height:30px;border:1px solid var(--rule);border-radius:5px;padding:0;cursor:pointer;overflow:hidden}
  .pal-swatch input{width:100%;height:100%;border:0;padding:0;cursor:pointer;background:transparent}
  .pal-preview{height:34px;border:1px solid var(--rule);border-radius:5px;background:linear-gradient(135deg,var(--p1),var(--p2));position:relative;overflow:hidden}
  .pal-preview::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(45deg,rgba(255,255,255,.04) 0 6px,transparent 6px 12px)}
  .x-btn{
    width:30px;height:30px;border:1px solid var(--rule);border-radius:6px;
    font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink-2);
    display:inline-flex;align-items:center;justify-content:center;
  }
  .x-btn:hover{border-color:var(--accent);color:var(--accent)}

  .add-btn{
    margin-top:8px;padding:8px 14px;border:1px dashed var(--rule);border-radius:6px;
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);
  }
  .add-btn:hover{border-color:var(--ink);color:var(--ink)}

  /* sticky save bar */
  .savebar{
    position:sticky;bottom:0;z-index:10;
    margin:24px -40px -80px;padding:14px 40px;
    background:rgba(236,231,221,.94);
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    border-top:1px solid var(--rule);
    display:flex;align-items:center;gap:12px;justify-content:space-between;
  }
  .savebar .status{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2)}
  .savebar .status.dirty{color:var(--accent)}
  .savebar .status.saved{color:var(--green)}
  .savebar .status .ind{display:inline-block;width:7px;height:7px;border-radius:50%;background:currentColor;margin-right:8px;vertical-align:middle}

  /* sections editor (for Troubadour) */
  .sect-block{border:1px solid var(--rule);border-radius:8px;padding:16px;margin-bottom:14px;background:var(--paper-2)}
  .sect-head-row{display:grid;grid-template-columns:120px 1fr auto;gap:10px;align-items:center;margin-bottom:10px}
  .sect-items{display:grid;grid-template-columns:46px 46px 1fr 1fr auto;gap:8px;align-items:center;margin-top:8px}
  .sect-items .hdr{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2)}

  .empty{padding:60px 24px;text-align:center;color:var(--ink-2);font-family:"JetBrains Mono",monospace;font-size:13px;letter-spacing:.04em;text-transform:uppercase}

  textarea{font-family:"Archivo",sans-serif}

  /* toast */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:50;
    padding:10px 18px;border-radius:999px;background:var(--ink);color:var(--paper);
    font-family:"JetBrains Mono",monospace;font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;
    box-shadow:0 12px 32px rgba(0,0,0,.25);
    opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;
  }
  .toast.is-on{opacity:1;transform:translateX(-50%) translateY(-4px)}
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="admin.jsx"></script>
</body>
</html>
