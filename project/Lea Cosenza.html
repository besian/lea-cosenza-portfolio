<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Lea Cosenza — Editor & Designer</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

<style>
  :root{
    --paper:#ece7dd;
    --paper-2:#e2dccf;
    --ink:#161412;
    --ink-2:#3a3530;
    --rule:rgba(22,20,18,.18);
    --rule-2:rgba(22,20,18,.08);
    --accent:#ff3b1f;
    --grid:1.2vw;
    --maxw:1760px;
    --pad:clamp(16px,2.2vw,40px);
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
    font-family:"Archivo",sans-serif;font-weight:500;
    -webkit-font-smoothing:antialiased;text-rendering:geometricPrecision;
    overflow-x:hidden;
  }
  body{cursor:none}
  body.no-cursor-custom{cursor:auto}
  body.dark{--paper:#0d0c0b;--paper-2:#161412;--ink:#ece7dd;--ink-2:#bdb7a9;--rule:rgba(236,231,221,.18);--rule-2:rgba(236,231,221,.08)}
  a{color:inherit;text-decoration:none}
  button{background:none;border:0;color:inherit;font:inherit;padding:0}
  ::selection{background:var(--accent);color:var(--paper)}

  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-weight:500;letter-spacing:.02em}
  .ital{font-family:"Instrument Serif",serif;font-style:italic;font-weight:400}
  .upper{text-transform:uppercase}
  .num{font-variant-numeric:tabular-nums}

  /* ── Top bar ───────────────────────────────────────────────── */
  .topbar{
    position:fixed;top:0;left:0;right:0;z-index:50;
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
    padding:14px var(--pad);
    font-family:"JetBrains Mono",monospace;font-size:11.5px;letter-spacing:.04em;
    text-transform:uppercase;color:var(--ink);
    background:linear-gradient(to bottom,var(--paper) 70%,rgba(0,0,0,0));
    pointer-events:none;
  }
  .topbar > *{pointer-events:auto}
  .topbar .left,.topbar .right{display:flex;gap:18px;align-items:center}
  .topbar .right{justify-content:flex-end}
  .mark{
    display:inline-flex;align-items:center;gap:8px;font-weight:700;
  }
  .mark .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;display:inline-block;animation:rec 1.4s steps(1) infinite}
  @keyframes rec{50%{opacity:.2}}
  .topbar .center{font-size:10.5px;color:var(--ink-2)}
  .topbar nav{display:flex;gap:18px}
  .topbar a{position:relative}
  .topbar a:hover{color:var(--accent)}

  /* ── Hero ──────────────────────────────────────────────────── */
  .hero{
    position:relative;width:100%;min-height:100svh;
    padding:48px var(--pad) 0;overflow:hidden;
    border-bottom:1px solid var(--rule);
    display:flex;flex-direction:column;
  }
  .hero-stage{
    position:relative;flex:1;min-height:0;
    display:grid;grid-template-rows:auto 1fr auto;align-items:center;gap:10px;
    padding:10px 0 18px;
  }
  .hero-grid{
    position:absolute;inset:0;
    background-image:
      linear-gradient(var(--rule-2) 1px,transparent 1px),
      linear-gradient(90deg,var(--rule-2) 1px,transparent 1px);
    background-size:var(--grid) var(--grid);
    mask-image:radial-gradient(120% 90% at 50% 50%,#000 30%,transparent 80%);
    pointer-events:none;
  }
  .reel{
    position:relative;justify-self:center;align-self:center;
    width:min(48vw,720px,62vh);aspect-ratio:16/9;
    background:#0a0a0a;color:#fff;overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.18);
    border:1px solid var(--rule);
    z-index:1;
  }

  /* ── Hero feature (typographic ticker, replaces video box) ── */
  .hero-feat{
    position:relative;justify-self:center;align-self:center;
    width:min(60vw,820px);
    display:flex;flex-direction:column;align-items:center;gap:14px;
    text-align:center;z-index:2;
    padding:14px 20px;
  }
  .hf-mast{
    display:flex;align-items:center;gap:10px;
    font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:500;
    letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);
  }
  .hf-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);animation:rec 1.4s steps(1) infinite}
  .hf-rule{display:inline-block;width:38px;height:1px;background:var(--rule)}
  .hf-idx{color:var(--ink)}
  .hf-stack{
    position:relative;width:100%;
    height:clamp(160px,22vh,260px);
    overflow:hidden;
  }
  .hf-line{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    opacity:0;transform:translateY(14px);
    transition:opacity .6s cubic-bezier(.6,0,.2,1), transform .6s cubic-bezier(.6,0,.2,1);
  }
  .hf-line.is-on{opacity:1;transform:translateY(0)}
  .hf-verb{
    font-family:"Instrument Serif",serif;font-style:italic;font-weight:400;
    font-size:clamp(28px,3.2vw,48px);line-height:.9;
    color:var(--ink-2);letter-spacing:-0.01em;
  }
  .hf-period{color:var(--accent)}
  .hf-title{
    font-family:"Archivo",sans-serif;font-weight:900;
    font-size:clamp(48px,6.4vw,108px);line-height:.86;letter-spacing:-0.04em;
    text-transform:uppercase;color:var(--ink);
    text-wrap:balance;
  }
  .hf-meta{
    font-family:"JetBrains Mono",monospace;font-size:11.5px;font-weight:500;
    letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);
  }
  .hf-foot{
    display:flex;justify-content:space-between;width:100%;
    padding-top:10px;border-top:1px solid var(--rule);
    font-family:"JetBrains Mono",monospace;font-size:10.5px;
    letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);
  }
  .hf-arrow{color:var(--accent);font-weight:700}
  body.dark .reel{box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .reel-frame{position:absolute;inset:0;opacity:0;transition:opacity .6s}
  .reel-frame.is-active{opacity:1}
  .reel-tc{
    position:absolute;left:14px;bottom:12px;font-family:"JetBrains Mono",monospace;
    font-size:11px;letter-spacing:.05em;color:#fff;mix-blend-mode:difference;
  }
  .reel-tc .rec{display:inline-block;width:8px;height:8px;background:#ff3b1f;border-radius:50%;
    margin-right:6px;vertical-align:middle;animation:rec 1.2s steps(1) infinite}
  .reel-corner{position:absolute;width:18px;height:18px;border:1.5px solid #fff;mix-blend-mode:difference}
  .reel-corner.tl{top:8px;left:8px;border-right:0;border-bottom:0}
  .reel-corner.tr{top:8px;right:8px;border-left:0;border-bottom:0}
  .reel-corner.bl{bottom:8px;left:8px;border-right:0;border-top:0}
  .reel-corner.br{bottom:8px;right:8px;border-left:0;border-top:0}

  .name-row{
    display:flex;align-items:baseline;justify-content:space-between;gap:1.2vw;
    font-family:"Archivo",sans-serif;font-weight:900;
    font-size:clamp(48px,10.4vw,176px);
    line-height:.86;letter-spacing:-0.045em;
    text-transform:uppercase;color:var(--ink);
    pointer-events:none;position:relative;z-index:3;
  }
  .name-row.top{justify-content:flex-start}
  .name-row.bot{justify-content:flex-end}
  .name-row .big{white-space:nowrap}
  .name-row .ital{font-family:"Instrument Serif",serif;font-style:italic;font-weight:400;font-size:1.04em;color:var(--accent);letter-spacing:-0.02em}
  .name-row .mark-sm{
    font-family:"JetBrains Mono",monospace;font-weight:500;
    font-size:11px;letter-spacing:.06em;align-self:flex-end;padding-bottom:.4em;
    color:var(--ink-2);text-transform:uppercase;text-wrap:balance;max-width:26ch;line-height:1.5;
    flex-shrink:1;min-width:0;
  }
  .name-row.bot .mark-sm{text-align:left;order:1}
  .name-row.bot .big{order:2}
  .name-dot{display:inline-block;width:.13em;height:.13em;background:var(--accent);border-radius:50%;margin:0 .06em .15em;vertical-align:middle}

  .hero-strap{
    position:relative;z-index:4;
    display:grid;grid-template-columns:repeat(3,1fr);gap:32px;
    padding:18px 0 22px;border-top:1px solid var(--rule);
    font-family:"JetBrains Mono",monospace;font-size:11.5px;letter-spacing:.04em;
    text-transform:uppercase;color:var(--ink);background:var(--paper);
  }
  .hero-strap p{margin:0;max-width:42ch;line-height:1.55;color:var(--ink)}
  .hero-strap .lbl{color:var(--accent);display:block;margin-bottom:6px;font-size:10.5px;letter-spacing:.1em}
  .hero-strap .tag{color:var(--ink-2)}

  .marquee{
    position:relative;z-index:4;
    border-top:1px solid var(--rule);
    overflow:hidden;background:var(--paper);
  }
  .marquee-track{
    display:flex;gap:48px;padding:10px 0;
    font-family:"Archivo",sans-serif;font-weight:800;font-size:13px;
    letter-spacing:.16em;text-transform:uppercase;white-space:nowrap;
    animation:mq 38s linear infinite;
  }
  .marquee-track span{display:inline-flex;align-items:center;gap:48px}
  .marquee-track span::after{content:"●";color:var(--accent);font-size:8px}
  @keyframes mq{to{transform:translateX(-50%)}}

  /* ── Index ─────────────────────────────────────────────────── */
  section{padding:80px var(--pad)}
  .sec-head{
    display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:end;
    padding-bottom:24px;border-bottom:1px solid var(--rule);
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--ink-2);
  }
  .sec-head h2{
    margin:0;color:var(--ink);
    font-family:"Archivo",sans-serif;font-weight:900;font-size:clamp(34px,5.6vw,82px);
    line-height:.9;letter-spacing:-0.03em;text-transform:uppercase;
  }
  .sec-head h2 em{font-family:"Instrument Serif",serif;font-style:italic;font-weight:400;letter-spacing:-0.01em}

  .filters{display:flex;flex-wrap:wrap;gap:6px}
  .filters button{
    padding:6px 12px;border-radius:999px;border:1px solid var(--rule);
    font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--ink);
  }
  .filters button.is-on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .filters .count{color:var(--ink-2);margin-left:6px;font-size:9.5px}

  /* ── Featured spotlight ─────────────────────────────────────── */
  .ft-title{padding:36px 0 28px;border-bottom:1px solid var(--rule)}
  .ft-kicker{
    display:flex;flex-wrap:wrap;gap:18px;
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--ink-2);
  }
  .ft-h{
    margin:18px 0 0;font-family:"Archivo",sans-serif;font-weight:900;
    font-size:clamp(54px,9.6vw,160px);line-height:.86;letter-spacing:-0.04em;text-transform:uppercase;color:var(--ink);
    overflow-wrap:break-word;word-break:normal;
  }
  .ft-h em{font-family:"Instrument Serif",serif;font-style:italic;font-weight:400;color:var(--accent);letter-spacing:-0.02em}
  .ft-lede{
    margin:28px 0 0;font-family:"Archivo",sans-serif;font-weight:500;
    font-size:clamp(18px,1.6vw,26px);line-height:1.35;color:var(--ink);max-width:54ch;
  }
  .ft-lede em{font-family:"Instrument Serif",serif;font-style:italic;background:var(--accent);color:var(--paper);padding:0 .14em;border-radius:2px}

  .ft-grid{
    margin-top:28px;display:grid;
    grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(3,16vw);
    gap:10px;cursor:none;
  }
  .ft-cell{position:relative;overflow:hidden;border:1px solid var(--rule);background:#0a0a0a}
  .ft-hero{grid-column:1/4;grid-row:1/4}
  .ft-a   {grid-column:4/7;grid-row:1/2}
  .ft-b   {grid-column:4/6;grid-row:2/3}
  .ft-c   {grid-column:6/7;grid-row:2/3}
  .ft-cta {grid-column:4/7;grid-row:3/4;background:var(--ink);color:var(--paper);border-color:var(--ink);display:flex;align-items:center;justify-content:center}
  .ft-cta-inner{display:flex;justify-content:space-between;align-items:center;width:100%;padding:0 28px;
    font-family:"Archivo",sans-serif;font-weight:900;font-size:clamp(22px,3vw,44px);
    letter-spacing:-0.02em;text-transform:uppercase;line-height:1;
  }
  .ft-cta-l em{font-family:"Instrument Serif",serif;font-style:italic;font-weight:400;color:var(--accent)}
  .ft-cta-r{font-size:1.6em;color:var(--accent)}
  .ft-cell:hover{transform:scale(1.005);transition:transform .25s}
  .ft-cta:hover{background:var(--accent);color:var(--paper)}
  .ft-cta:hover .ft-cta-r{color:var(--paper)}

  .ft-tag{
    position:absolute;font-family:"JetBrains Mono",monospace;font-size:11px;
    font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#fff;
    mix-blend-mode:difference;padding:3px 8px;background:rgba(0,0,0,.4);
    backdrop-filter:blur(6px);
  }
  .ft-tag.tl{top:10px;left:10px;background:transparent;padding:0;mix-blend-mode:difference}
  .ft-hero-tc{
    position:absolute;left:14px;bottom:12px;font-family:"JetBrains Mono",monospace;
    font-size:11.5px;letter-spacing:.05em;color:#fff;mix-blend-mode:difference;text-transform:uppercase;
  }
  .ft-hero-tc .rec{display:inline-block;width:8px;height:8px;background:#ff3b1f;border-radius:50%;margin-right:6px;vertical-align:middle;animation:rec 1.2s steps(1) infinite}

  .ft-stats{
    list-style:none;margin:32px 0 0;padding:24px 0 0;
    display:grid;grid-template-columns:repeat(6,1fr);gap:24px;
    border-top:1px solid var(--rule);
  }
  .ft-stats li{display:flex;flex-direction:column;gap:6px}
  .ft-stat-v{
    font-family:"Archivo",sans-serif;font-weight:900;
    font-size:clamp(40px,5.4vw,86px);line-height:.86;letter-spacing:-0.03em;color:var(--ink);
  }
  .ft-stat-l{
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--ink-2);
  }

  /* ─────────────────────────────────────────────────────────── */

  .idx{display:flex;flex-direction:column}
  .row{
    position:relative;display:grid;
    grid-template-columns:60px minmax(0,2.6fr) minmax(0,1.4fr) minmax(0,1fr);
    gap:20px;align-items:center;
    padding:18px 0;border-bottom:1px solid var(--rule);
    cursor:none;
  }
  body.compact .row{padding:10px 0}
  .row .num{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.04em;color:var(--ink-2)}
  .row .ttl{
    font-family:"Archivo",sans-serif;font-weight:800;
    font-size:clamp(22px,3.2vw,42px);line-height:1;letter-spacing:-0.02em;
    text-transform:uppercase;
    display:flex;align-items:baseline;gap:14px;
  }
  .row .ttl .yr{font-family:"Instrument Serif",serif;font-style:italic;font-weight:400;font-size:.5em;letter-spacing:0;color:var(--ink-2)}
  .row .cli{font-family:"JetBrains Mono",monospace;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-2)}
  .row .disc{font-family:"JetBrains Mono",monospace;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-2)}
  .row .fmt{justify-self:end;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.04em;color:var(--ink-2)}

  .row .ttl-wrap{position:relative;overflow:hidden;padding-right:.2em}
  .row .ttl-fx{position:absolute;left:0;top:0;color:var(--accent);
    clip-path:inset(0 100% 0 0);transition:clip-path .6s cubic-bezier(.7,0,.2,1)}
  .row:hover .ttl-fx{clip-path:inset(0 0 0 0)}
  .row:hover{background:var(--paper-2)}
  .row .arrow{display:inline-block;margin-left:6px;transition:transform .4s}
  .row:hover .arrow{transform:translateX(6px)}

  /* "+ Add new case study" button at end of index */
  .idx-create{
    display:flex;align-items:baseline;justify-content:space-between;gap:24px;
    width:100%;padding:28px 0;margin-top:6px;
    border-bottom:1px solid var(--rule);background:transparent;cursor:none;
    text-align:left;
  }
  .idx-create:hover{background:var(--paper-2)}
  .idx-create > span:first-child{
    font-family:"Archivo",sans-serif;font-weight:800;
    font-size:clamp(20px,2.4vw,32px);line-height:1;letter-spacing:-0.02em;
    text-transform:uppercase;color:var(--ink-2);
  }
  .idx-create:hover > span:first-child{color:var(--accent)}
  .idx-create-hint{
    font-family:"JetBrains Mono",monospace;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-2);
  }

  /* hover scrub thumb */
  .scrub{
    position:fixed;pointer-events:none;width:280px;aspect-ratio:16/9;
    z-index:30;opacity:0;transform:translate(-50%,-50%) scale(.96);
    transition:opacity .18s,transform .18s;
    border:1px solid var(--rule);background:#0a0a0a;overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
  }
  .scrub.is-on{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .scrub-tc{position:absolute;left:8px;bottom:6px;font-family:"JetBrains Mono",monospace;font-size:10px;color:#fff;mix-blend-mode:difference}
  .scrub-bar{position:absolute;left:0;right:0;bottom:0;height:3px;background:rgba(255,255,255,.18)}
  .scrub-bar .fill{height:100%;background:var(--accent)}

  /* ── About ─────────────────────────────────────────────────── */
  .about{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.4fr);gap:48px;align-items:start}
  .about .lede{
    font-family:"Archivo",sans-serif;font-weight:500;
    font-size:clamp(22px,2.6vw,38px);line-height:1.15;letter-spacing:-0.015em;
  }
  .about .lede em{font-family:"Instrument Serif",serif;font-style:italic;font-weight:400}
  .about .lede mark{background:var(--accent);color:var(--paper);padding:0 .12em;border-radius:2px}
  .about .meta{display:grid;grid-template-columns:auto 1fr;gap:14px 28px;
    font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-2);align-content:start}
  .about .meta dt{color:var(--ink)}
  .about .meta a:hover{color:var(--accent)}

  /* ── Footer ────────────────────────────────────────────────── */
  footer{
    border-top:1px solid var(--rule);background:var(--paper);
    padding:60px var(--pad) 24px;
  }
  .foot-name{
    font-family:"Archivo",sans-serif;font-weight:900;font-size:clamp(80px,18vw,300px);
    line-height:.82;letter-spacing:-0.045em;text-transform:uppercase;
    margin:0 0 36px;color:var(--ink);
  }
  .foot-name .stroke{-webkit-text-stroke:1.5px var(--ink);color:transparent}
  .foot-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:48px;
    font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-2)}
  .foot-grid h4{margin:0 0 10px;color:var(--ink);font-weight:700;font-size:10.5px;letter-spacing:.1em}
  .foot-grid a{display:block;padding:3px 0}
  .foot-grid a:hover{color:var(--accent)}
  .colophon{
    margin-top:48px;padding-top:14px;border-top:1px solid var(--rule);
    display:flex;justify-content:space-between;gap:20px;
    font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);
  }

  /* ── Custom cursor ─────────────────────────────────────────── */
  .cursor{position:fixed;z-index:9998;top:0;left:0;pointer-events:none;
    mix-blend-mode:difference;transition:transform .14s cubic-bezier(.2,.6,.2,1),width .18s,height .18s,border-radius .18s;
    transform:translate(-50%,-50%);will-change:transform;
    width:14px;height:14px;border-radius:50%;background:var(--paper);
  }
  .cursor.is-link{width:48px;height:48px;background:var(--accent);mix-blend-mode:normal}
  .cursor.is-play{width:84px;height:84px;border-radius:999px;background:var(--accent);mix-blend-mode:normal;
    display:flex;align-items:center;justify-content:center;color:var(--paper);
    font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
  .cursor.is-press{transform:translate(-50%,-50%) scale(.55)}
  .cursor.is-hidden{opacity:0}

  /* ── Case study modal ──────────────────────────────────────── */
  .cs{position:fixed;inset:0;z-index:200;background:var(--paper);
    transform:translateY(100%);transition:transform .55s cubic-bezier(.78,0,.2,1);
    overflow-y:auto;overflow-x:hidden;}
  .cs.is-open{transform:translateY(0)}
  .cs-head{position:sticky;top:0;z-index:5;
    display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:20px;
    padding:14px var(--pad);background:var(--paper);border-bottom:1px solid var(--rule);
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-2)}
  .cs-close{
    padding:8px 14px;border:1px solid var(--ink);border-radius:999px;
    font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
  .cs-close:hover{background:var(--ink);color:var(--paper)}
  .cs-title{
    padding:60px var(--pad) 30px;border-bottom:1px solid var(--rule);
  }
  .cs-title .kicker{
    font-family:"JetBrains Mono",monospace;font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-2);
    display:flex;gap:24px;flex-wrap:wrap;margin-bottom:24px;
  }
  .cs-title h1{
    margin:0;font-family:"Archivo",sans-serif;font-weight:900;
    font-size:clamp(48px,10vw,180px);line-height:.86;letter-spacing:-0.04em;text-transform:uppercase;
  }
  .cs-title h1 em{font-family:"Instrument Serif",serif;font-style:italic;font-weight:400;letter-spacing:-0.01em}
  .cs-hero{margin:0 var(--pad);aspect-ratio:21/9;background:#0a0a0a;position:relative;overflow:hidden;border:1px solid var(--rule)}
  .cs-block{padding:80px var(--pad);border-bottom:1px solid var(--rule)}
  .cs-block:last-child{border-bottom:0}
  .cs-2col{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.6fr);gap:48px}
  .cs-2col .h{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2)}
  .cs-2col p{margin:0 0 1em;font-size:clamp(18px,1.5vw,22px);line-height:1.45;max-width:60ch}
  .cs-2col p em{font-family:"Instrument Serif",serif;font-style:italic}
  .cs-frames{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .cs-frame{aspect-ratio:16/9;background:#0a0a0a;position:relative;overflow:hidden;border:1px solid var(--rule)}
  .cs-frame.span-2{grid-column:span 2}
  .cs-frame.span-3{grid-column:span 3}
  .cs-frame.span-4{grid-column:span 4}
  .cs-frame .tc{position:absolute;left:8px;bottom:6px;font-family:"JetBrains Mono",monospace;font-size:10px;color:#fff;mix-blend-mode:difference}
  .cs-quote{
    font-family:"Instrument Serif",serif;font-style:italic;font-weight:400;
    font-size:clamp(34px,4.5vw,68px);line-height:1.05;letter-spacing:-0.015em;
    max-width:24ch;
  }
  .cs-quote .src{display:block;margin-top:18px;font-family:"JetBrains Mono",monospace;font-style:normal;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-2)}
  .cs-credits{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 32px;font-family:"JetBrains Mono",monospace;font-size:13px;letter-spacing:.02em;text-transform:uppercase}
  .cs-credits .role{color:var(--ink-2)}

  /* Case study — multi-medium sections */
  .cs-sect-head{display:grid;grid-template-columns:auto 1fr;column-gap:32px;row-gap:14px;align-items:end;margin-bottom:32px;padding-bottom:18px;border-bottom:1px solid var(--rule)}
  .cs-sect-kind{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);align-self:start;padding-top:6px}
  .cs-sect-h{margin:0;font-family:"Archivo",sans-serif;font-weight:900;font-size:clamp(32px,4.4vw,64px);line-height:.9;letter-spacing:-0.03em;text-transform:uppercase;color:var(--ink)}
  .cs-sect-copy{grid-column:2/3;margin:0;max-width:60ch;font-size:clamp(15px,1.2vw,18px);line-height:1.5;color:var(--ink-2)}
  .cs-sect-grid{display:grid;gap:14px}
  .cs-sect-item{margin:0;display:flex;flex-direction:column;gap:10px}
  .cs-sect-frame{position:relative;aspect-ratio:16/9;background:#0a0a0a;border:1px solid var(--rule);overflow:hidden}
  .cs-sect-frame.is-vert{aspect-ratio:9/16;max-width:240px;margin:0 auto}
  .cs-sect-item.is-poster .cs-sect-frame{aspect-ratio:7/10}
  .cs-sect-rec{position:absolute;left:10px;bottom:8px;font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.06em;color:#fff;mix-blend-mode:difference;text-transform:uppercase}
  .cs-sect-rec span{display:inline-block;width:7px;height:7px;background:#ff3b1f;border-radius:50%;margin-right:6px;vertical-align:middle}
  .cs-sect-cap{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .cs-sect-cap-t{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink)}
  .cs-sect-cap-m{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-2)}

  /* ── Singleton media sections (image / video) ─────────────── */
  .cs-singleton{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(0,1fr);gap:32px;align-items:start}
  .cs-singleton.is-image .cs-singleton-frame,
  .cs-singleton.is-video .cs-singleton-frame{
    position:relative;aspect-ratio:16/9;background:#0a0a0a;border:1px solid var(--rule);overflow:hidden;
  }
  .cs-singleton-tc{
    position:absolute;left:16px;bottom:14px;
    font-family:"JetBrains Mono",monospace;font-size:12px;color:#fff;
    mix-blend-mode:difference;letter-spacing:.06em;text-transform:uppercase;
  }
  .cs-singleton-tc span{display:inline-block;width:8px;height:8px;background:#ff3b1f;border-radius:50%;
    margin-right:8px;vertical-align:middle;animation:rec 1.2s steps(1) infinite}
  .cs-singleton-edit{
    position:absolute;top:14px;left:14px;z-index:4;
    display:flex;gap:10px;align-items:center;padding:8px 12px;
    background:rgba(0,0,0,.55);color:#fff;border-radius:8px;backdrop-filter:blur(8px);
  }
  .cs-singleton-meta{display:flex;flex-direction:column;gap:18px}
  .cs-singleton-cap{
    font-family:"Instrument Serif",serif;font-style:italic;font-weight:400;
    font-size:clamp(20px,1.7vw,28px);line-height:1.3;color:var(--ink);letter-spacing:-0.005em;
  }
  .cs-singleton-vmeta{
    display:flex;flex-direction:column;gap:8px;padding-top:14px;border-top:1px solid var(--rule);
  }
  .cs-singleton-vmeta > span{
    display:grid;grid-template-columns:80px 1fr;align-items:baseline;gap:14px;
    font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);
  }
  .cs-singleton-vmeta .vk{color:var(--ink-2)}

  /* ── Text-only section ────────────────────────────────────── */
  .is-kind-text .cs-sect-head{
    grid-template-columns:auto 1fr;
  }
  .is-kind-text .cs-sect-copy{
    font-family:"Archivo",sans-serif;font-weight:500;
    font-size:clamp(18px,1.5vw,22px);line-height:1.45;color:var(--ink);max-width:62ch;
  }
  .cs-next{
    display:grid;grid-template-columns:1fr auto;gap:24px;align-items:end;
    padding:80px var(--pad);background:var(--ink);color:var(--paper);
  }
  .cs-next .nxt-lbl{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.6;margin-bottom:18px}
  .cs-next h3{margin:0;font-family:"Archivo",sans-serif;font-weight:900;font-size:clamp(40px,7vw,120px);line-height:.86;letter-spacing:-0.03em;text-transform:uppercase}
  .cs-next .btn{padding:14px 22px;border:1px solid var(--paper);border-radius:999px;font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
  .cs-next .btn:hover{background:var(--paper);color:var(--ink)}

  /* ── Case study — INLINE EDIT MODE ─────────────────────────── */
  .cs.is-editing{padding-bottom:90px}
  .cs-head-actions{display:flex;gap:8px;align-items:center;justify-content:flex-end}
  .cs-close.ghost{background:transparent}
  .cs-close.solid{background:var(--accent);border-color:var(--accent);color:var(--paper)}
  .cs-close.solid:hover{background:var(--ink);border-color:var(--ink);color:var(--paper)}
  .cs-close:disabled{opacity:.4;cursor:not-allowed}

  /* contentEditable affordances */
  .ed-on{
    outline:1px dashed transparent;outline-offset:3px;
    border-radius:2px;cursor:text;transition:outline-color .12s,background .12s;
    min-width:.6em;
  }
  .ed-on:hover{outline-color:var(--rule)}
  .ed-on:focus{outline:1px solid var(--accent);outline-offset:3px;background:rgba(255,59,31,.05)}
  .ed-on:empty::before{content:attr(data-placeholder);color:var(--ink-2);opacity:.55}

  /* per-section toolbar (edit mode) */
  .cs.is-editing .cs-block{position:relative}
  .ed-section-bar{
    position:absolute;top:14px;right:var(--pad);z-index:3;
    display:flex;gap:6px;align-items:center;
    padding:6px 10px;background:var(--ink);color:var(--paper);border-radius:999px;
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  }
  .ed-section-tag{padding-right:4px}
  .ed-mini{
    width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.1);color:var(--paper);
    display:inline-flex;align-items:center;justify-content:center;font-size:13px;line-height:1;
    border:0;
  }
  .ed-mini:hover{background:rgba(255,255,255,.22)}
  .ed-mini.danger:hover{background:var(--accent)}
  .ed-mini:disabled{opacity:.3;cursor:not-allowed}

  /* swatch picker (color pair) */
  .ed-swatch{display:inline-flex;gap:6px}
  .ed-swatch label{
    display:inline-block;width:26px;height:26px;border-radius:6px;border:1px solid rgba(255,255,255,.4);
    cursor:pointer;overflow:hidden;position:relative;
  }
  .ed-swatch input{appearance:none;-webkit-appearance:none;width:100%;height:100%;border:0;padding:0;cursor:pointer;background:transparent;opacity:0;position:absolute;inset:0}

  /* hero plate edit overlay */
  .cs-hero{position:relative}
  .cs-hero-tc{
    position:absolute;left:16px;bottom:14px;
    font-family:"JetBrains Mono",monospace;font-size:12px;color:#fff;
    mix-blend-mode:difference;letter-spacing:.06em;text-transform:uppercase;
  }
  .cs-hero-tc span{display:inline-block;width:8px;height:8px;background:#ff3b1f;border-radius:50%;
    margin-right:8px;vertical-align:middle;animation:rec 1.2s steps(1) infinite}
  .cs-hero-edit{
    position:absolute;top:14px;left:14px;z-index:4;
    display:flex;gap:10px;align-items:center;padding:8px 12px;
    background:rgba(0,0,0,.55);color:#fff;border-radius:8px;
    backdrop-filter:blur(8px);
  }
  .ed-hint{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.7)}

  /* default frames mosaic edit overlay */
  .cs-frame{position:relative}
  .cs-frame-edit{
    position:absolute;left:8px;bottom:8px;right:8px;z-index:3;
    display:flex;gap:8px;align-items:center;
    padding:6px 8px;background:rgba(0,0,0,.55);border-radius:6px;
    backdrop-filter:blur(8px);
  }
  .ed-frame-lbl{flex:1;color:#fff;font-size:10.5px}
  .ed-frame-lbl.ed-on:hover{outline-color:rgba(255,255,255,.4)}
  .ed-frame-lbl.ed-on:focus{outline-color:var(--accent);background:rgba(255,255,255,.08)}

  /* per-item edit overlay (sections) */
  .cs-item-edit{
    position:absolute;top:8px;right:8px;z-index:3;
    display:flex;gap:6px;align-items:center;
    padding:5px 7px;background:rgba(0,0,0,.55);border-radius:6px;
    backdrop-filter:blur(8px);
  }
  .ed-x{
    width:22px;height:22px;border-radius:50%;
    background:rgba(255,255,255,.15);color:#fff;
    display:inline-flex;align-items:center;justify-content:center;font-size:14px;line-height:1;
    border:0;
  }
  .ed-x:hover{background:var(--accent)}
  .ed-x.dark{background:rgba(255,255,255,.15)}

  /* add-item placeholder card */
  .cs-sect-add{
    display:flex;align-items:center;justify-content:center;
    aspect-ratio:16/9;border:1.5px dashed var(--rule);border-radius:6px;background:transparent;
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink-2);cursor:pointer;
  }
  .cs-sect-add:hover{border-color:var(--ink);color:var(--ink);background:rgba(0,0,0,.03)}

  /* credit row remove + add */
  .ed-add{
    margin-top:14px;padding:7px 14px;border:1px dashed var(--rule);border-radius:999px;
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink-2);cursor:pointer;
  }
  .ed-add:hover{border-color:var(--ink);color:var(--ink)}

  /* insert-section divider */
  .ed-insert{
    margin:0 var(--pad);padding:14px 0;display:flex;justify-content:center;
    border-bottom:1px solid var(--rule-2);
  }
  .ed-insert-btn{
    padding:8px 22px;border:1.5px dashed var(--rule);border-radius:999px;
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink-2);cursor:pointer;background:var(--paper);
  }
  .ed-insert-btn:hover{border-color:var(--ink);color:var(--ink);background:var(--paper-2)}
  .ed-insert-picker{
    display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;
    padding:10px 14px;background:var(--paper-2);border-radius:999px;
  }
  .ed-insert-lbl{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2)}
  .ed-insert-picker button{
    padding:7px 14px;border-radius:999px;background:var(--ink);color:var(--paper);
    font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    border:0;cursor:pointer;
  }
  .ed-insert-picker button:hover{background:var(--accent)}
  .ed-insert-picker .ed-insert-x{background:transparent;color:var(--ink-2);font-weight:500;text-transform:lowercase}
  .ed-insert-picker .ed-insert-x:hover{color:var(--accent);background:transparent}

  /* sticky edit-mode banner pinned to the viewport bottom */
  .ed-banner{
    position:fixed;left:0;right:0;bottom:0;z-index:201;
    display:flex;justify-content:space-between;align-items:center;gap:24px;
    padding:12px var(--pad);
    background:rgba(22,20,18,.94);color:var(--paper);
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    border-top:1px solid rgba(255,255,255,.1);
  }
  .ed-banner-l{display:flex;align-items:center;gap:10px;
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase}
  .ed-banner-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:rec 1.2s steps(1) infinite}
  .ed-banner-r{display:flex;align-items:center;gap:10px}
  .ed-banner-hint{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-right:6px}
  .ed-banner .cs-close.ghost{border-color:rgba(255,255,255,.4);color:var(--paper)}
  .ed-banner .cs-close.ghost:hover{background:rgba(255,255,255,.1)}
  .ed-banner .cs-close.solid{background:var(--accent);border-color:var(--accent);color:var(--paper)}
  .ed-banner .cs-close.solid:hover{background:var(--paper);color:var(--ink);border-color:var(--paper)}
  .ed-banner .cs-close.ghost.danger{border-color:var(--accent);color:var(--accent)}
  .ed-banner .cs-close.ghost.danger:hover{background:var(--accent);color:var(--paper)}

  /* edit-mode dims non-editable chrome a touch for focus */
  .cs.is-editing .cs-next{opacity:.35;pointer-events:none}

  /* ── Easter eggs ───────────────────────────────────────────── */
  .flash{position:fixed;inset:0;z-index:9990;background:var(--paper);pointer-events:none;opacity:0;
    transition:opacity .12s}
  .flash.is-on{opacity:1}
  .konami{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9991;
    pointer-events:none;text-align:center;opacity:0;transition:opacity .4s}
  .konami.is-on{opacity:1}
  .konami .ttl{font-family:"Archivo",sans-serif;font-weight:900;font-size:clamp(40px,9vw,140px);
    line-height:.85;letter-spacing:-0.04em;text-transform:uppercase;color:var(--accent)}
  .konami .sub{font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);margin-top:10px}

  .keyhint{
    position:fixed;right:16px;bottom:14px;z-index:25;
    font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);
    display:flex;gap:14px;align-items:center;pointer-events:none;
    background:var(--paper);padding:6px 10px;border:1px solid var(--rule);border-radius:8px;
    opacity:.85;
  }
  .keyhint kbd{
    display:inline-block;padding:2px 6px;margin-right:6px;border:1px solid var(--rule);
    border-radius:4px;font:inherit;background:var(--paper-2);color:var(--ink);
  }

  /* Frame placeholder backgrounds — striped */
  .ph{
    position:absolute;inset:0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,.04) 0 8px, transparent 8px 16px),
      linear-gradient(135deg, var(--c1,#444) 0%, var(--c2,#222) 100%);
  }
  .ph .lbl{position:absolute;left:10px;top:10px;font-family:"JetBrains Mono",monospace;font-size:10px;color:rgba(255,255,255,.75);letter-spacing:.06em;text-transform:uppercase}
  .ph .lbl2{position:absolute;right:10px;top:10px;font-family:"JetBrains Mono",monospace;font-size:10px;color:rgba(255,255,255,.55);letter-spacing:.06em;text-transform:uppercase}

  /* Reduce motion */
  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
